<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Patrick Show Media Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-gray-50">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-2">Dan Patrick Show Media Search</h1>

        <p class="text-gray-700 mb-6">
            Search by date, keyword, or both. You can also view recently added videos or search what happened on this day across DP Show history.
        </p>

        <div class="bg-white shadow rounded p-4 mb-5">
            <div class="flex flex-wrap items-end gap-4 mb-4">
                <label class="block">
                    <span class="font-semibold">Date:</span>
                    <input type="date" id="dateInput" class="border p-2 ml-2 rounded">
                </label>

                <label class="block">
                    <span class="font-semibold">Keyword:</span>
                    <input 
                        type="text" 
                        id="keywordInput" 
                        class="border p-2 ml-2 rounded w-72" 
                        placeholder="LeBron, Cubs, Jordan..."
                    >
                </label>

                <button 
                    id="searchButton" 
                    onclick="searchMedia()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded"
                >
                    Search
                </button>

                <button 
                    onclick="showOnThisDay()" 
                    class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded"
                >
                    On This Day
                </button>

                <button 
                    onclick="showRecentlyAdded()" 
                    class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded"
                >
                    Recently Added
                </button>

                <button 
                    onclick="clearSearch()" 
                    class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded"
                >
                    Clear
                </button>
            </div>

            <div class="border-t pt-4">
                <p class="font-semibold mb-2">Quick Searches:</p>

                <div class="flex flex-wrap gap-2">
                    <button onclick="quickSearch('NBA')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm">NBA</button>
                    <button onclick="quickSearch('NFL')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm">NFL</button>
                    <button onclick="quickSearch('MLB')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm">MLB</button>
                    <button onclick="quickSearch('Cubs')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm">Cubs</button>
                    <button onclick="quickSearch('Yankees')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm">Yankees</button>
                    <button onclick="quickSearch('Colts')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm">Colts</button>
                    <button onclick="quickSearch('Pacers')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm">Pacers</button>

                    <button onclick="quickSearch('LeBron')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm">LeBron</button>
                    <button onclick="quickSearch('Jordan')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm">Jordan</button>
                    <button onclick="quickSearch('Kobe')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm">Kobe</button>
                    <button onclick="quickSearch('Barkley')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm">Barkley</button>
                    <button onclick="quickSearch('Shaq')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm">Shaq</button>

                    <button onclick="quickSearch('McLovin')" class="bg-orange-100 hover:bg-orange-200 text-orange-900 px-3 py-1 rounded text-sm">McLovin</button>
                    <button onclick="quickSearch('Fritzy')" class="bg-orange-100 hover:bg-orange-200 text-orange-900 px-3 py-1 rounded text-sm">Fritzy</button>
                    <button onclick="quickSearch('Seton')" class="bg-orange-100 hover:bg-orange-200 text-orange-900 px-3 py-1 rounded text-sm">Seton</button>
                    <button onclick="quickSearch('Paulie')" class="bg-orange-100 hover:bg-orange-200 text-orange-900 px-3 py-1 rounded text-sm">Paulie</button>

                    <button onclick="quickSearch('Full Interview')" class="bg-blue-100 hover:bg-blue-200 text-blue-900 px-3 py-1 rounded text-sm">Full Interview</button>
                    <button onclick="quickSearch('DP Show Open')" class="bg-blue-100 hover:bg-blue-200 text-blue-900 px-3 py-1 rounded text-sm">DP Show Open</button>
                    <button onclick="quickSearch('DP Cold Open')" class="bg-blue-100 hover:bg-blue-200 text-blue-900 px-3 py-1 rounded text-sm">DP Cold Open</button>
                    <button onclick="quickSearch('Play of the Day')" class="bg-blue-100 hover:bg-blue-200 text-blue-900 px-3 py-1 rounded text-sm">Play of the Day</button>
                </div>
            </div>
        </div>

        <p id="statusMessage" class="mb-4 text-gray-800 font-medium"></p>

        <div id="results" class="space-y-4"></div>
    </div>

    <script>
        const workerUrl = "https://crimson-shape-c0f8.usedsubmarine.workers.dev/";

        function formatDateTime(value) {
            if (!value) return "";

            const date = new Date(value);

            if (isNaN(date.getTime())) {
                return value;
            }

            return date.toLocaleString(undefined, {
                year: "numeric",
                month: "short",
                day: "numeric",
                hour: "numeric",
                minute: "2-digit"
            });
        }

        function formatDateOnly(value) {
            if (!value) return "";

            const date = new Date(value + "T00:00:00");

            if (isNaN(date.getTime())) {
                return value;
            }

            return date.toLocaleDateString(undefined, {
                year: "numeric",
                month: "long",
                day: "numeric"
            });
        }

        function escapeHtml(value) {
            if (!value) return "";

            return value
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function getTodayMonthDay() {
            const today = new Date();
            const month = String(today.getMonth() + 1).padStart(2, "0");
            const day = String(today.getDate()).padStart(2, "0");

            return `${month}-${day}`;
        }

        function buildNoResultsMessage(dateInput, keywordInput, searchType, monthDay) {
            if (searchType === "recent") {
                return "No recently added videos found.";
            }

            if (searchType === "onThisDay") {
                return `No videos found for this day in DP Show history: ${monthDay}.`;
            }

            if (dateInput && keywordInput) {
                return `No results found for keyword "${keywordInput}" on ${dateInput}.`;
            }

            if (dateInput) {
                return `No results found for ${dateInput}.`;
            }

            if (keywordInput) {
                return `No results found for keyword "${keywordInput}".`;
            }

            return "No results found.";
        }

        async function copyText(text, button) {
            try {
                await navigator.clipboard.writeText(text);

                const originalText = button.innerText;
                button.innerText = "Copied!";
                button.classList.add("bg-green-700");

                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove("bg-green-700");
                }, 1200);
            } catch (error) {
                alert("Could not copy to clipboard.");
                console.error("Clipboard error:", error);
            }
        }

        function buildSocialPost(item) {
            const title = item.title || "DP Show archive find";
            const dateText = item.date ? formatDateOnly(item.date) : "";
            const url = item.url || "";

            if (dateText) {
                return `DP Show archive find:\n\n${dateText} — ${title}\n\nWatch: ${url}`;
            }

            return `DP Show archive find:\n\n${title}\n\nWatch: ${url}`;
        }

        async function copyLinkFromButton(button) {
            const url = button.getAttribute("data-url");
            await copyText(url, button);
        }

        async function copySocialPostFromButton(button) {
            const post = button.getAttribute("data-post");
            await copyText(post, button);
        }

        async function quickSearch(keyword) {
            document.getElementById("keywordInput").value = keyword;
            await searchMedia();
        }

        async function searchMedia() {
            const dateInput = document.getElementById("dateInput").value;
            const keywordInput = document.getElementById("keywordInput").value.trim();

            if (!dateInput && !keywordInput) {
                alert("Please enter a date, a keyword, or both.");
                return;
            }

            const params = new URLSearchParams();

            if (dateInput) {
                params.append("date", dateInput);
            }

            if (keywordInput) {
                params.append("query", keywordInput);
            }

            params.append("t", Date.now());

            await runSearch(params, "normal", "");
        }

        async function showOnThisDay() {
            const monthDay = getTodayMonthDay();

            const params = new URLSearchParams();
            params.append("month_day", monthDay);
            params.append("t", Date.now());

            await runSearch(params, "onThisDay", monthDay);
        }

        async function showRecentlyAdded() {
            const params = new URLSearchParams();
            params.append("recent", "true");
            params.append("t", Date.now());

            await runSearch(params, "recent", "");
        }

        async function runSearch(params, searchType, monthDay) {
            const button = document.getElementById("searchButton");
            const statusMessage = document.getElementById("statusMessage");
            const resultsDiv = document.getElementById("results");
            const dateInput = document.getElementById("dateInput").value;
            const keywordInput = document.getElementById("keywordInput").value.trim();

            button.disabled = true;
            button.innerText = "Searching...";
            statusMessage.innerText = "Searching...";
            resultsDiv.innerHTML = "";

            const url = `${workerUrl}?${params.toString()}`;

            try {
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error("Failed to fetch data");
                }

                const data = await response.json();

                resultsDiv.innerHTML = "";

                if (!data || data.length === 0 || data[0].title === "No results found") {
                    const message = buildNoResultsMessage(dateInput, keywordInput, searchType, monthDay);
                    statusMessage.innerText = message;

                    resultsDiv.innerHTML = `
                        <div class="bg-white shadow rounded p-4 text-gray-700">
                            ${message}
                        </div>
                    `;
                    return;
                }

                if (searchType === "onThisDay") {
                    statusMessage.innerText = `Found ${data.length} result(s) from this day in DP Show history: ${monthDay}.`;
                } else if (searchType === "recent") {
                    statusMessage.innerText = `Found ${data.length} recently added result(s).`;
                } else {
                    statusMessage.innerText = `Found ${data.length} result(s).`;
                }

                data.forEach(item => {
                    const safeTitle = escapeHtml(item.title || "");
                    const safeDescription = escapeHtml(item.description || "");
                    const published = formatDateTime(item.published_at);
                    const displayDate = item.date ? formatDateOnly(item.date) : "";
                    const thumbnail = item.thumbnail || "";
                    const itemUrl = item.url || "#";
                    const socialPost = buildSocialPost(item);

                    resultsDiv.innerHTML += `
                        <div class="bg-white shadow rounded overflow-hidden">
                            <div class="flex flex-col md:flex-row">
                                <div class="md:w-64 bg-gray-100 flex items-center justify-center p-3">
                                    ${
                                        thumbnail 
                                            ? `<img src="${thumbnail}" alt="Thumbnail" class="w-full max-w-60 rounded">`
                                            : `<span class="text-gray-400">No thumbnail</span>`
                                    }
                                </div>

                                <div class="flex-1 p-4">
                                    <h2 class="text-xl font-bold mb-2">${safeTitle}</h2>

                                    <div class="text-sm text-gray-600 mb-3">
                                        ${
                                            displayDate
                                                ? `<span class="font-semibold">Show date:</span> ${displayDate}`
                                                : ""
                                        }
                                        ${
                                            published
                                                ? `<span class="ml-0 md:ml-4 block md:inline"><span class="font-semibold">Published:</span> ${published}</span>`
                                                : ""
                                        }
                                    </div>

                                    <p class="text-gray-700 text-sm mb-4 whitespace-pre-line">${safeDescription}</p>

                                    <div class="flex flex-wrap gap-2">
                                        <a 
                                            href="${itemUrl}" 
                                            class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded text-sm" 
                                            target="_blank"
                                        >
                                            View on YouTube
                                        </a>

                                        <button 
                                            onclick="copyLinkFromButton(this)" 
                                            data-url="${escapeHtml(itemUrl)}"
                                            class="bg-gray-700 hover:bg-gray-800 text-white px-3 py-2 rounded text-sm"
                                        >
                                            Copy Link
                                        </button>

                                        <button 
                                            onclick="copySocialPostFromButton(this)" 
                                            data-post="${escapeHtml(socialPost)}"
                                            class="bg-orange-600 hover:bg-orange-700 text-white px-3 py-2 rounded text-sm"
                                        >
                                            Copy Social Post
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                console.error("Error:", error);
                statusMessage.innerText = "Error fetching data. Please try again.";
                alert("Error fetching data. Please try again.");
            } finally {
                button.disabled = false;
                button.innerText = "Search";
            }
        }

        function clearSearch() {
            document.getElementById("dateInput").value = "";
            document.getElementById("keywordInput").value = "";
            document.getElementById("statusMessage").innerText = "";
            document.getElementById("results").innerHTML = "";
        }
    </script>
</body>
</html>
