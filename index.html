<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Patrick Show Media Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-gray-50">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-2">Dan Patrick Show Media Search</h1>

        <p class="text-gray-700 mb-6">
            Search by date, keyword, or both. You can also view recently added videos or search what happened on this day across DP Show history.
        </p>

        <div class="flex flex-wrap items-end gap-4 mb-4">
            <label class="block">
                <span class="font-semibold">Date:</span>
                <input type="date" id="dateInput" class="border p-2 ml-2 rounded">
            </label>

            <label class="block">
                <span class="font-semibold">Keyword:</span>
                <input 
                    type="text" 
                    id="keywordInput" 
                    class="border p-2 ml-2 rounded w-72" 
                    placeholder="LeBron, Cubs, Jordan..."
                >
            </label>

            <button 
                id="searchButton" 
                onclick="searchMedia()" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded"
            >
                Search
            </button>

            <button 
                onclick="showOnThisDay()" 
                class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded"
            >
                On This Day
            </button>

            <button 
                onclick="showRecentlyAdded()" 
                class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded"
            >
                Recently Added
            </button>

            <button 
                onclick="clearSearch()" 
                class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded"
            >
                Clear
            </button>
        </div>

        <p id="statusMessage" class="mb-4 text-gray-800 font-medium"></p>

        <div class="overflow-x-auto bg-white shadow rounded">
            <table class="border-collapse border border-gray-300 w-full">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="border p-2 text-left w-40">Thumbnail</th>
                        <th class="border p-2 text-left">Title / Description</th>
                        <th class="border p-2 text-left w-48">Published</th>
                        <th class="border p-2 text-left w-32">Date</th>
                        <th class="border p-2 text-left w-24">URL</th>
                    </tr>
                </thead>
                <tbody id="results"></tbody>
            </table>
        </div>
    </div>

    <script>
        const workerUrl = "https://crimson-shape-c0f8.usedsubmarine.workers.dev/";

        function formatDateTime(value) {
            if (!value) return "";

            const date = new Date(value);

            if (isNaN(date.getTime())) {
                return value;
            }

            return date.toLocaleString(undefined, {
                year: "numeric",
                month: "short",
                day: "numeric",
                hour: "numeric",
                minute: "2-digit"
            });
        }

        function escapeHtml(value) {
            if (!value) return "";

            return value
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function getTodayMonthDay() {
            const today = new Date();
            const month = String(today.getMonth() + 1).padStart(2, "0");
            const day = String(today.getDate()).padStart(2, "0");

            return `${month}-${day}`;
        }

        function buildNoResultsMessage(dateInput, keywordInput, searchType, monthDay) {
            if (searchType === "recent") {
                return "No recently added videos found.";
            }

            if (searchType === "onThisDay") {
                return `No videos found for this day in DP Show history: ${monthDay}.`;
            }

            if (dateInput && keywordInput) {
                return `No results found for keyword "${keywordInput}" on ${dateInput}.`;
            }

            if (dateInput) {
                return `No results found for ${dateInput}.`;
            }

            if (keywordInput) {
                return `No results found for keyword "${keywordInput}".`;
            }

            return "No results found.";
        }

        async function searchMedia() {
            const dateInput = document.getElementById("dateInput").value;
            const keywordInput = document.getElementById("keywordInput").value.trim();

            if (!dateInput && !keywordInput) {
                alert("Please enter a date, a keyword, or both.");
                return;
            }

            const params = new URLSearchParams();

            if (dateInput) {
                params.append("date", dateInput);
            }

            if (keywordInput) {
                params.append("query", keywordInput);
            }

            params.append("t", Date.now());

            await runSearch(params, "normal", "");
        }

        async function showOnThisDay() {
            const monthDay = getTodayMonthDay();

            const params = new URLSearchParams();
            params.append("month_day", monthDay);
            params.append("t", Date.now());

            await runSearch(params, "onThisDay", monthDay);
        }

        async function showRecentlyAdded() {
            const params = new URLSearchParams();
            params.append("recent", "true");
            params.append("t", Date.now());

            await runSearch(params, "recent", "");
        }

        async function runSearch(params, searchType, monthDay) {
            const button = document.getElementById("searchButton");
            const statusMessage = document.getElementById("statusMessage");
            const tableBody = document.getElementById("results");
            const dateInput = document.getElementById("dateInput").value;
            const keywordInput = document.getElementById("keywordInput").value.trim();

            button.disabled = true;
            button.innerText = "Searching...";
            statusMessage.innerText = "Searching...";
            tableBody.innerHTML = "";

            const url = `${workerUrl}?${params.toString()}`;

            try {
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error("Failed to fetch data");
                }

                const data = await response.json();

                tableBody.innerHTML = "";

                if (!data || data.length === 0 || data[0].title === "No results found") {
                    const message = buildNoResultsMessage(dateInput, keywordInput, searchType, monthDay);
                    statusMessage.innerText = message;

                    tableBody.innerHTML = `
                        <tr>
                            <td class="border p-3" colspan="5">${message}</td>
                        </tr>
                    `;
                    return;
                }

                if (searchType === "onThisDay") {
                    statusMessage.innerText = `Found ${data.length} result(s) from this day in DP Show history: ${monthDay}.`;
                } else if (searchType === "recent") {
                    statusMessage.innerText = `Found ${data.length} recently added result(s).`;
                } else {
                    statusMessage.innerText = `Found ${data.length} result(s).`;
                }

                data.forEach(item => {
                    const safeTitle = escapeHtml(item.title || "");
                    const safeDescription = escapeHtml(item.description || "");
                    const published = formatDateTime(item.published_at);
                    const thumbnail = item.thumbnail || "";
                    const url = item.url || "#";

                    tableBody.innerHTML += `
                        <tr class="align-top">
                            <td class="border p-2">
                                ${
                                    thumbnail 
                                        ? `<img src="${thumbnail}" alt="Thumbnail" class="w-36 rounded">`
                                        : `<span class="text-gray-400">No thumbnail</span>`
                                }
                            </td>
                            <td class="border p-2">
                                <div class="font-semibold mb-1">${safeTitle}</div>
                                <div class="text-sm text-gray-700">${safeDescription}</div>
                            </td>
                            <td class="border p-2">${published}</td>
                            <td class="border p-2">${item.date || ""}</td>
                            <td class="border p-2">
                                <a href="${url}" class="text-blue-600 hover:underline" target="_blank">View</a>
                            </td>
                        </tr>
                    `;
                });

            } catch (error) {
                console.error("Error:", error);
                statusMessage.innerText = "Error fetching data. Please try again.";
                alert("Error fetching data. Please try again.");
            } finally {
                button.disabled = false;
                button.innerText = "Search";
            }
        }

        function clearSearch() {
            document.getElementById("dateInput").value = "";
            document.getElementById("keywordInput").value = "";
            document.getElementById("statusMessage").innerText = "";
            document.getElementById("results").innerHTML = "";
        }
    </script>
</body>
</html>
